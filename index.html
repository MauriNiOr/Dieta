<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Registro de Hábitos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f4f3; color: #2c3e50; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .wrapper { width: 100%; max-width: 500px; display: block; }
        
        /* Tarjetas y Contenedores */
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 24px; text-align: center; color: #16a085; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #34495e; margin-bottom: 15px; border-left: 4px solid #1abc9c; padding-left: 10px; }
        
        /* Formulario */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; color: #4b6584; }
        input[type="number"], select { width: 100%; padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; font-size: 16px; background-color: #f9f9f9; transition: all 0.3s; }
        input[type="number"]:focus, select:focus { border-color: #1abc9c; background-color: #fff; outline: none; }
        
        button { width: 100%; padding: 14px; background-color: #1abc9c; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        button:hover { background-color: #16a085; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* Stats Dashboard */
        .stats-grid { display: block; width: 100%; margin-bottom: 5px; }
        .stat-box { display: inline-block; width: 47%; background: #e8f8f5; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .stat-box:nth-child(even) { float: right; }
        .stat-box .num { display: block; font-size: 20px; font-weight: bold; color: #16a085; }
        .stat-box .lbl { font-size: 12px; color: #7f8c8d; margin-top: 2px; }
        .clearfix { clear: both; }

        /* Historial y Tablas */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background-color: #f4f6f6; padding: 12px 10px; font-weight: 600; color: #7f8c8d; border-bottom: 2px solid #eaeded; }
        td { padding: 12px 10px; border-bottom: 1px solid #f2f4f4; color: #2c3e50; }
        tr:hover { background-color: #fbfcfc; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge.si { background-color: #d4efdf; color: #27ae60; }
        .badge.no { background-color: #f9e79f; color: #b7950b; }
        
        .mensaje { text-align: center; margin-top: 15px; font-weight: bold; display: none; font-size: 14px; }
        .no-data { text-align: center; color: #bdc3c7; padding: 20px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>Mi Progreso de Verano</h1>
        <p class="subtitle">Control diario de salud y energía</p>
        
        <form id="registroForm">
            <div class="form-group">
                <label for="calorias">Calorías Consumidas (kcal)</label>
                <input type="number" id="calorias" placeholder="Ej: 1950" required min="0">
            </div>
            <div class="form-group">
                <label for="pasos">Pasos Totales</label>
                <input type="number" id="pasos" placeholder="Ej: 10500" required min="0">
            </div>
            <div class="form-group">
                <label for="gym">¿Entrenamiento en el Gym?</label>
                <select id="gym">
                    <option value="Sí">Sí, cumplido 💪</option>
                    <option value="No">No por hoy 🛌</option>
                </select>
            </div>
            <button type="submit" id="btnEnviar">Guardar Día</button>
        </form>
        <div id="mensajeExito" class="mensaje" style="color: #27ae60;">¡Guardado en la nube e historial actualizado!</div>
    </div>

    <div class="card">
        <h2>Resumen del Verano</h2>
        <div class="stats-grid">
            <div class="stat-box">
                <span class="num" id="statDias">0</span>
                <span class="lbl">Días Registrados</span>
            </div>
            <div class="stat-box">
                <span class="num" id="statCalorias">0</span>
                <span class="lbl">Media kcal</span>
            </div>
            <div class="stat-box">
                <span class="num" id="statPasos">0</span>
                <span class="lbl">Media Pasos</span>
            </div>
            <div class="stat-box">
                <span class="num" id="statGym">0</span>
                <span class="lbl">Días de Gym</span>
            </div>
            <div class="clearfix"></div>
        </div>
    </div>

    <div class="card" style="padding-bottom: 15px;">
        <h2>Historial de Entradas</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Kcal</th>
                        <th>Pasos</th>
                        <th>Gym</th>
                    </tr>
                </thead>
                <tbody id="tablaHistorial">
                    </tbody>
            </table>
            <div id="sinDatos" class="no-data">Aún no hay registros de tus hábitos.</div>
        </div>
    </div>
</div>

<script>
    // --- CONTROL DE SEGURIDAD (CONTRASEÑA) ---
    const CONTRASEÑA_CORRECTA = "Mauri123";

    let intento = prompt("Introduce la contraseña para acceder:");
    if (intento !== CONTRASEÑA_CORRECTA) {
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px; color:#e74c3c; font-family:sans-serif;'>Acceso denegado</h1>";
        throw new Error("Contraseña incorrecta");
    }

    // --- ENLACE CON GOOGLE SHEETS ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzmK5KJ6Z1CSPUpCyjqra_yRqPy-XORad5VVVAoczJnnOo7w0YCRssfzKfMXuT_s7VJyQ/exec";

    // Cargar historial local al abrir la página
    let historial = JSON.parse(localStorage.getItem('historialDieta')) || [];

    // Función para renderizar la tabla e indicadores visuales
    function actualizarInterfaz() {
        const tbody = document.getElementById('tablaHistorial');
        const sinDatos = document.getElementById('sinDatos');
        
        tbody.innerHTML = "";
        
        if (historial.length === 0) {
            sinDatos.style.display = "block";
            return;
        }
        sinDatos.style.display = "none";

        let totalCalorias = 0;
        let totalPasos = 0;
        let totalGym = 0;

        historial.slice().reverse().forEach(dia => {
            const row = document.createElement('tr');
            const badgeClass = dia.gym === 'Sí' ? 'badge si' : 'badge no';
            const gymTexto = dia.gym === 'Sí' ? 'Sí' : 'No';

            row.innerHTML = `
                <td><strong>${dia.fecha}</strong></td>
                <td>${Number(dia.calorias).toLocaleString()} kcal</td>
                <td>${Number(dia.pasos).toLocaleString()}</td>
                <td><span class="${badgeClass}">${gymTexto}</span></td>
            `;
            tbody.appendChild(row);

            totalCalorias += Number(dia.calorias);
            totalPasos += Number(dia.pasos);
            if(dia.gym === 'Sí') totalGym++;
        });

        const numDias = historial.length;
        document.getElementById('statDias').innerText = numDias;
        document.getElementById('statCalorias').innerText = Math.round(totalCalorias / numDias);
        document.getElementById('statPasos').innerText = Math.round(totalPasos / numDias).toLocaleString();
        document.getElementById('statGym').innerText = totalGym;
    }

    document.getElementById('registroForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btnEnviar');
        const mensaje = document.getElementById('mensajeExito');
        
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const fechaActual = new Date();
        const formatoFecha = fechaActual.getDate() + "/" + (fechaActual.getMonth() + 1);

        const nuevosDatos = {
            fecha: formatoFecha,
            calorias: document.getElementById('calorias').value,
            pasos: document.getElementById('pasos').value,
            gym: document.getElementById('gym').value
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nuevosDatos)
        })
        .then(() => {
            historial.push(nuevosDatos);
            localStorage.setItem('historialDieta', JSON.stringify(historial));
            actualizarInterfaz();

            mensaje.style.display = "block";
            document.getElementById('registroForm').reset();
            btn.disabled = false;
            btn.innerText = "Guardar Día";
            
            setTimeout(() => { mensaje.style.display = "none"; }, 4000);
        })
        .catch(error => {
            alert('Hubo un problema de red al guardar los datos.');
            console.error(error);
            btn.disabled = false;
            btn.innerText = "Guardar Día";
        });
    });

    actualizarInterfaz();
</script>

</body>
</html>
